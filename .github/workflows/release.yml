name: Package and Release Addon

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and Upload to CurseForge
        uses: BigWigsMods/packager@v2
        with:
          args: "-g 12.0" # Usiamo 12.0 invece di 12.0.1 per massima compatibilità API
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}